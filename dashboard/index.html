<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Search Beauty AI</title>

    <!--
      Shopify App Bridge v4 — Meta tag method (current recommended approach)
      ───────────────────────────────────────────────────────────────────────
      The API key is injected at build time by Vite from your .env file:
        VITE_SHOPIFY_API_KEY=your_client_id_here

      App Bridge reads this meta tag automatically when the script loads.
      The script MUST be in <head> and before your app bundle.

      Docs: https://shopify.dev/docs/api/app-bridge-library
    -->
    <meta name="shopify-api-key" content="%VITE_SHOPIFY_API_KEY%" />
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
   
  </body>
</html>
